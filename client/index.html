    <style>
      /* Critical inline CSS: instant FCP before JS hydrates */
      #root{min-height:100vh;min-height:100dvh}
      .css-shell{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,#c084fc,#f9a8d4,#fde68a)}

  <body>
    <script>
      // Initialize theme before React loads to prevent flash and hook issues
      (function() {
        try {
          var theme = localStorage.getItem('classify-theme');
          if (theme === 'true' || theme === '"dark"' || theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"><div class="css-shell"><img src="/logo.webp" alt="Classify" width="128" height="128" fetchpriority="high"><h1>Classify</h1><p>&#x1F3AE; Let's Play & Learn!</p></div></div>
    <script type="module" src="/src/main.tsx"></script>
    <script defer>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
