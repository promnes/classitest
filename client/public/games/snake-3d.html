<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake 3D — Fruit Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#070e18;color:#fff;user-select:none;-webkit-user-select:none}

/* ─── Screens ─────────────────────────────── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1;transition:opacity .3s}
.screen.active{display:flex}

/* ─── Menu ────────────────────────────────── */
#menu-screen{background:radial-gradient(ellipse at 50% 40%,#0a2810 0%,#050e08 100%)}
.menu-emoji{font-size:64px;margin-bottom:8px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.game-title{font-size:32px;font-weight:900;background:linear-gradient(135deg,#43e97b,#38f9d7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.game-subtitle{font-size:16px;color:#aaa;margin-bottom:24px}
.btn{display:inline-block;padding:12px 32px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;outline:none;color:#fff}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#060e08;box-shadow:0 4px 20px rgba(67,233,123,.3)}
.btn-secondary{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#06081e;box-shadow:0 4px 20px rgba(79,172,254,.3)}
.btn-danger{background:linear-gradient(135deg,#f5576c,#ff6b6b);box-shadow:0 4px 20px rgba(245,87,108,.25)}
.btn-small{padding:8px 20px;font-size:14px;border-radius:8px}

/* ─── Controls Select ─────────────────────── */
#controls-screen{background:radial-gradient(ellipse at 50% 40%,#121228 0%,#060610 100%)}
.controls-title{font-size:22px;font-weight:700;margin-bottom:20px}
.controls-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;max-width:360px}
.control-option{flex:1;min-width:90px;max-width:110px;padding:16px 8px;border-radius:12px;border:2px solid #333;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.04)}
.control-option.selected{border-color:#4facfe;background:rgba(79,172,254,.12);box-shadow:0 0 12px rgba(79,172,254,.2)}
.control-option .opt-emoji{font-size:28px;margin-bottom:4px}
.control-option .opt-label{font-size:14px;font-weight:700}
.control-option .opt-desc{font-size:11px;color:#888;margin-top:2px}

/* ─── Stages ──────────────────────────────── */
#stages-screen{background:radial-gradient(ellipse at 50% 30%,#0a1a28 0%,#050a10 100%);overflow-y:auto;padding:16px 0;justify-content:flex-start;padding-top:24px}
.stages-header{font-size:20px;font-weight:700;margin-bottom:12px}
#stages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px;width:90%;margin-bottom:16px}
.stage-card{position:relative;padding:12px 6px;border-radius:12px;border:2px solid #333;text-align:center;cursor:pointer;transition:all .2s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.stage-card:active:not(.locked){transform:scale(.95)}
.stage-card.locked{opacity:.5;cursor:default}
.stage-emoji{font-size:24px}
.stage-num{font-size:11px;color:#888}
.stage-name{font-size:12px;font-weight:700}
.stage-stars{font-size:12px;letter-spacing:1px}
.stage-best{font-size:10px;color:#aaa}
.stage-endless{font-size:16px;position:absolute;top:4px;right:6px}
#skin-selector{width:90%;max-width:360px;margin-bottom:16px;text-align:center}
.skin-label{font-size:14px;color:#aaa;margin-bottom:6px}
.skin-list{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}
.skin-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.skin-btn.selected{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.3);transform:scale(1.1)}
.skin-btn.locked{opacity:.4;cursor:default}

/* ─── Game Screen ─────────────────────────── */
#game-screen{background:#070e18}
#game-canvas{width:100%;height:100%;display:block;touch-action:none}
#btn-pause{position:absolute;top:8px;right:8px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}
[data-lang="ar"] #btn-pause{right:auto;left:8px}

/* ─── D-Pad ───────────────────────────────── */
#dpad{position:absolute;bottom:24px;right:24px;display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px;gap:4px;z-index:5}
[data-lang="ar"] #dpad{right:auto;left:24px}
.dpad-btn{width:48px;height:48px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(255,255,255,.25)}
.dpad-btn[data-dir="up"]{grid-column:2;grid-row:1}
.dpad-btn[data-dir="left"]{grid-column:1;grid-row:2}
.dpad-btn[data-dir="right"]{grid-column:3;grid-row:2}
.dpad-btn[data-dir="down"]{grid-column:2;grid-row:3}

/* ─── Results ─────────────────────────────── */
#results-screen{background:radial-gradient(ellipse at 50% 40%,#121228 0%,#060610 100%)}
.results-box{text-align:center;max-width:320px;padding:24px}
#results-title{font-size:28px;font-weight:900;margin-bottom:8px}
#results-stars{font-size:32px;margin-bottom:12px;letter-spacing:4px}
#results-score{font-size:20px;font-weight:700;margin-bottom:16px;color:#ccc}
#results-details{font-size:14px;color:#999;line-height:1.8;margin-bottom:24px}
.results-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ─── Responsive ──────────────────────────── */
@media(max-height:580px){
  .menu-emoji{font-size:48px}
  .game-title{font-size:26px}
  #stages-grid{gap:6px}
  .stage-card{padding:8px 4px;min-height:80px}
}
@media(max-width:340px){
  #stages-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .dpad-btn{width:40px;height:40px;font-size:17px}
}
</style>
</head>
<body>

<!-- ─── Menu Screen ──────────────────────── -->
<div id="menu-screen" class="screen active">
  <div class="menu-emoji">🐍</div>
  <div class="game-title" id="game-title">ثعبان المعرفة</div>
  <div class="game-subtitle" id="game-subtitle">مغامرة الفواكه! 🍎</div>
  <button class="btn btn-primary" id="btn-play">ابدأ المغامرة</button>
</div>

<!-- ─── Controls Screen ──────────────────── -->
<div id="controls-screen" class="screen">
  <div class="controls-title" id="controls-title">اختر طريقة التحكم</div>
  <div class="controls-grid">
    <div class="control-option" data-mode="swipe">
      <div class="opt-emoji">👆</div>
      <div class="opt-label" data-i18n="swipeMode">السحب</div>
      <div class="opt-desc" data-i18n="swipeDesc">اسحب الشاشة</div>
    </div>
    <div class="control-option selected" data-mode="both">
      <div class="opt-emoji">🎮</div>
      <div class="opt-label" data-i18n="bothMode">الاثنان</div>
      <div class="opt-desc" data-i18n="bothDesc">السحب + الأزرار</div>
    </div>
    <div class="control-option" data-mode="dpad">
      <div class="opt-emoji">🕹️</div>
      <div class="opt-label" data-i18n="dpadMode">أزرار</div>
      <div class="opt-desc" data-i18n="dpadDesc">أزرار الاتجاهات</div>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-confirm-controls">تأكيد</button>
</div>

<!-- ─── Stages Screen ────────────────────── -->
<div id="stages-screen" class="screen">
  <div class="stages-header" id="stages-title">اختر المرحلة</div>
  <div id="stages-grid"></div>
  <div id="skin-selector"></div>
  <button class="btn btn-small btn-secondary" id="btn-stages-back">رجوع</button>
</div>

<!-- ─── Game Screen ──────────────────────── -->
<div id="game-screen" class="screen">
  <canvas id="game-canvas"></canvas>
  <button id="btn-pause">⏸</button>
  <div id="dpad">
    <button class="dpad-btn" data-dir="up">↗</button>
    <button class="dpad-btn" data-dir="left">↖</button>
    <button class="dpad-btn" data-dir="right">↘</button>
    <button class="dpad-btn" data-dir="down">↙</button>
  </div>
</div>

<!-- ─── Results Screen ───────────────────── -->
<div id="results-screen" class="screen">
  <div class="results-box">
    <div id="results-title">ممتاز!</div>
    <div id="results-stars">⭐⭐⭐</div>
    <div id="results-score"></div>
    <div id="results-details"></div>
    <div class="results-btns">
      <button class="btn btn-small btn-primary" id="btn-replay">🔄 إعادة</button>
      <button class="btn btn-small btn-secondary" id="btn-next">▶ التالي</button>
      <button class="btn btn-small btn-danger" id="btn-menu">📋 القائمة</button>
    </div>
  </div>
</div>

<script type="module">
  import { init } from './snake-3d-modules/core.js';
  init(document.getElementById('game-canvas'));
</script>
</body>
</html>
