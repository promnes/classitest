<!DOCTYPE html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>شطرنج - Chess Puzzles ♟️</title>
		<style>
/* ======= BASE RESET ======= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
	touch-action: none;
	margin: 0;
	border: 0 none;
	padding: 0;
	text-align: center;
	background: #0a0e1a;
	overflow: hidden;
	font-family: 'Segoe UI', 'Noto Sans Arabic', 'Cairo', 'Tajawal', sans-serif;
	direction: ltr;
}

/* ======= ANIMATED BACKGROUND ======= */
#bg-layer {
	position: fixed;
	inset: 0;
	z-index: 0;
	background: linear-gradient(135deg, #0d1117 0%, #161b2e 25%, #1a1040 50%, #0d1117 100%);
	overflow: hidden;
}

/* Animated chess board pattern overlay */
#bg-layer::before {
	content: '';
	position: absolute;
	inset: 0;
	background-image:
		linear-gradient(45deg, rgba(139,92,246,0.03) 25%, transparent 25%),
		linear-gradient(-45deg, rgba(139,92,246,0.03) 25%, transparent 25%),
		linear-gradient(45deg, transparent 75%, rgba(139,92,246,0.03) 75%),
		linear-gradient(-45deg, transparent 75%, rgba(139,92,246,0.03) 75%);
	background-size: 60px 60px;
	background-position: 0 0, 0 30px, 30px -30px, -30px 0;
	animation: bgShift 20s linear infinite;
}

/* Floating chess pieces decorations */
.floating-piece {
	position: absolute;
	font-size: 2.5rem;
	opacity: 0.06;
	animation: floatPiece 15s ease-in-out infinite;
	pointer-events: none;
	user-select: none;
}
.floating-piece:nth-child(1) { left: 8%; top: 15%; animation-delay: 0s; animation-duration: 18s; font-size: 3rem; }
.floating-piece:nth-child(2) { left: 85%; top: 10%; animation-delay: -3s; animation-duration: 22s; font-size: 2rem; }
.floating-piece:nth-child(3) { left: 20%; top: 75%; animation-delay: -6s; animation-duration: 16s; font-size: 2.8rem; }
.floating-piece:nth-child(4) { left: 70%; top: 80%; animation-delay: -9s; animation-duration: 20s; font-size: 2.2rem; }
.floating-piece:nth-child(5) { left: 50%; top: 40%; animation-delay: -4s; animation-duration: 25s; font-size: 3.5rem; }
.floating-piece:nth-child(6) { left: 35%; top: 90%; animation-delay: -7s; animation-duration: 19s; font-size: 2rem; }

@keyframes floatPiece {
	0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.04; }
	25% { transform: translateY(-30px) rotate(5deg); opacity: 0.08; }
	50% { transform: translateY(-15px) rotate(-3deg); opacity: 0.06; }
	75% { transform: translateY(-40px) rotate(8deg); opacity: 0.1; }
}

@keyframes bgShift {
	0% { background-position: 0 0, 0 30px, 30px -30px, -30px 0; }
	100% { background-position: 60px 60px, 60px 90px, 90px 30px, 30px 60px; }
}

/* ======= CANVAS ======= */
#canvas {
	display: block;
	margin: 0;
	color: white;
	position: relative;
	z-index: 1;
}

#canvas:focus { outline: none; }

/* ======= STATUS OVERLAY ======= */
#status {
	position: absolute;
	left: 0; top: 0; right: 0; bottom: 0;
	display: flex;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	z-index: 10;
}

/* ======= LOADING CONTAINER ======= */
#loading-container {
	position: absolute;
	inset: 0;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 5;
	background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(22,16,64,0.98) 100%);
	transition: opacity 0.8s ease, visibility 0.8s ease;
}

#loading-container.hidden {
	opacity: 0;
	visibility: hidden;
	pointer-events: none;
}

/* Chess piece icon animation */
.chess-icon {
	font-size: 5rem;
	margin-bottom: 1.5rem;
	animation: pieceFloat 3s ease-in-out infinite;
	filter: drop-shadow(0 0 20px rgba(139,92,246,0.5));
	user-select: none;
}

@keyframes pieceFloat {
	0%, 100% { transform: translateY(0) scale(1); }
	50% { transform: translateY(-12px) scale(1.05); }
}

/* Title */
.game-title {
	font-size: 1.8rem;
	font-weight: 800;
	background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed, #6d28d9);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	background-clip: text;
	margin-bottom: 0.4rem;
	letter-spacing: -0.02em;
}

.game-subtitle {
	font-size: 0.95rem;
	color: rgba(196, 181, 253, 0.7);
	margin-bottom: 2rem;
	font-weight: 400;
}

/* ======= PROGRESS BAR ======= */
#status-progress {
	width: 320px;
	max-width: 80vw;
	height: 10px;
	background: rgba(139,92,246,0.1);
	border: 1px solid rgba(139,92,246,0.2);
	border-radius: 999px;
	padding: 2px;
	visibility: visible;
	overflow: hidden;
	box-shadow: 0 0 15px rgba(139,92,246,0.1);
}

@media only screen and (orientation:portrait) {
	#status-progress { width: 70%; }
}

#status-progress-inner {
	height: 100%;
	width: 0;
	box-sizing: border-box;
	transition: width 0.5s ease;
	background: linear-gradient(90deg, #7c3aed, #a855f7, #c084fc);
	border-radius: 999px;
	box-shadow: 0 0 12px rgba(139,92,246,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
	position: relative;
}

/* Animated shimmer on progress bar */
#status-progress-inner::after {
	content: '';
	position: absolute;
	inset: 0;
	background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
	animation: shimmer 1.5s ease-in-out infinite;
	border-radius: 999px;
}

@keyframes shimmer {
	0% { transform: translateX(-100%); }
	100% { transform: translateX(100%); }
}

/* Loading percentage text */
#loading-percent {
	font-size: 0.85rem;
	color: rgba(196,181,253,0.8);
	margin-top: 0.8rem;
	font-weight: 600;
	font-variant-numeric: tabular-nums;
}

/* ======= INDETERMINATE SPINNER ======= */
#status-indeterminate {
	width: 48px;
	height: 48px;
	visibility: visible;
	position: relative;
}

/* Replace ugly triangles with a modern spinner */
#status-indeterminate > div {
	width: 0;
	height: 0;
	border: none;
	position: absolute;
}

/* Hide original Godot spinner divs, use CSS spinner instead */
#status-indeterminate::before {
	content: '';
	position: absolute;
	inset: 0;
	border: 3px solid rgba(139,92,246,0.15);
	border-top-color: #a855f7;
	border-radius: 50%;
	animation: spinnerRotate 0.9s linear infinite;
}

#status-indeterminate::after {
	content: '';
	position: absolute;
	inset: 6px;
	border: 3px solid rgba(192,132,252,0.1);
	border-bottom-color: #c084fc;
	border-radius: 50%;
	animation: spinnerRotate 1.4s linear infinite reverse;
}

@keyframes spinnerRotate {
	to { transform: rotate(360deg); }
}

/* ======= ERROR NOTICE ======= */
#status-notice {
	margin: 0 24px;
	line-height: 1.6;
	visibility: visible;
	padding: 1.2rem 1.8rem;
	font-family: 'Segoe UI', 'Noto Sans Arabic', sans-serif;
	color: #fca5a5;
	background: rgba(220,38,38,0.1);
	border: 1px solid rgba(220,38,38,0.3);
	border-radius: 12px;
	backdrop-filter: blur(8px);
	box-shadow: 0 4px 24px rgba(0,0,0,0.3);
	font-size: 0.9rem;
	max-width: 500px;
	text-align: start;
	direction: ltr;
}

/* ======= LOADING TIPS ======= */
.loading-tips {
	margin-top: 2rem;
	padding: 0 1.5rem;
}

.tip-text {
	font-size: 0.8rem;
	color: rgba(196,181,253,0.5);
	max-width: 340px;
	line-height: 1.5;
	animation: tipFade 8s ease-in-out infinite;
}

@keyframes tipFade {
	0%, 100% { opacity: 0.3; }
	10%, 90% { opacity: 1; }
}

/* ======= BOTTOM DECORATION ======= */
.bottom-pieces {
	position: absolute;
	bottom: 1.5rem;
	left: 50%;
	transform: translateX(-50%);
	display: flex;
	gap: 0.8rem;
	opacity: 0.15;
	font-size: 1.2rem;
	user-select: none;
}

/* ======= RESPONSIVE ======= */
@media (max-width: 480px) {
	.chess-icon { font-size: 3.5rem; margin-bottom: 1rem; }
	.game-title { font-size: 1.4rem; }
	.game-subtitle { font-size: 0.8rem; margin-bottom: 1.5rem; }
	#status-progress { height: 8px; }
	.floating-piece { font-size: 1.5rem !important; }
}
		</style>
		<link id='-gd-engine-icon' rel='icon' type='image/png' href='index.icon.png' />
		<link rel='apple-touch-icon' href='index.apple-touch-icon.png'/>
		<link rel='manifest' href='index.manifest.json'>
	</head>
	<body>
		<!-- Animated Background -->
		<div id="bg-layer">
			<div class="floating-piece">♚</div>
			<div class="floating-piece">♛</div>
			<div class="floating-piece">♞</div>
			<div class="floating-piece">♜</div>
			<div class="floating-piece">♝</div>
			<div class="floating-piece">♟</div>
		</div>

		<!-- Godot Canvas -->
		<canvas id="canvas">
			HTML5 canvas appears to be unsupported in the current browser.<br>
			Please try updating or use a different browser.
		</canvas>

		<!-- Custom Loading Screen -->
		<div id="loading-container">
			<div class="chess-icon">♟️</div>
			<div class="game-title">شطرنج - Chess Puzzles</div>
			<div class="game-subtitle">طوّر مهارات التفكير الاستراتيجي 🧠</div>

			<!-- These IDs are required by the Godot engine -->
			<div id="status">
				<div id="status-progress" style="display: none;" oncontextmenu="event.preventDefault();">
					<div id="status-progress-inner"></div>
				</div>
				<div id="status-indeterminate" style="display: none;" oncontextmenu="event.preventDefault();">
					<div></div><div></div><div></div><div></div>
					<div></div><div></div><div></div><div></div>
				</div>
				<div id="status-notice" class="godot" style="display: none;"></div>
			</div>

			<div id="loading-percent"></div>

			<div class="loading-tips">
				<p class="tip-text" id="tip-text">♟ هل تعلم؟ الشطرنج يعزز مهارات حل المشكلات والتخطيط الاستراتيجي!</p>
			</div>

			<div class="bottom-pieces">
				<span>♔</span><span>♕</span><span>♖</span><span>♗</span><span>♘</span><span>♙</span>
			</div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":57996864,"index.wasm":35708238},"focusCanvas":true,"gdextensionLibs":[],"serviceWorker":"index.service.worker.js"};
const engine = new Engine(GODOT_CONFIG);

(function () {
	const INDETERMINATE_STATUS_STEP_MS = 100;
	const statusProgress = document.getElementById('status-progress');
	const statusProgressInner = document.getElementById('status-progress-inner');
	const statusIndeterminate = document.getElementById('status-indeterminate');
	const statusNotice = document.getElementById('status-notice');
	const loadingContainer = document.getElementById('loading-container');
	const loadingPercent = document.getElementById('loading-percent');
	const tipText = document.getElementById('tip-text');

	// Rotating tips
	const tips = [
		"♟ هل تعلم؟ الشطرنج يعزز مهارات حل المشكلات والتخطيط الاستراتيجي!",
		"♞ الحصان هو القطعة الوحيدة التي تقفز فوق القطع الأخرى!",
		"♛ الملكة أقوى قطعة على الرقعة — تتحرك بكل الاتجاهات!",
		"♚ كش ملك! الهدف هو محاصرة ملك الخصم بحيث لا يستطيع الهروب.",
		"♜ القلعة تتحرك أفقياً وعمودياً بلا حدود!",
		"♝ الفيل يتحرك قطرياً — كل فيل يبقى على لون واحد طوال اللعبة.",
		"🧠 الشطرنج يحسن الذاكرة والتركيز — تمرين رائع للعقل!",
		"⏱️ جاري تحميل اللعبة... الملفات كبيرة لأن اللعبة غنية بالمحتوى!"
	];
	let tipIndex = 0;
	setInterval(() => {
		tipIndex = (tipIndex + 1) % tips.length;
		tipText.style.opacity = '0';
		setTimeout(() => {
			tipText.textContent = tips[tipIndex];
			tipText.style.opacity = '1';
		}, 400);
	}, 5000);

	let initializing = true;
	let statusMode = 'hidden';

	let animationCallbacks = [];
	function animate(time) {
		animationCallbacks.forEach((callback) => callback(time));
		requestAnimationFrame(animate);
	}
	requestAnimationFrame(animate);

	function animateStatusIndeterminate(ms) {
		const i = Math.floor((ms / INDETERMINATE_STATUS_STEP_MS) % 8);
		if (statusIndeterminate.children[i].style.borderTopColor === '') {
			Array.prototype.slice.call(statusIndeterminate.children).forEach((child) => {
				child.style.borderTopColor = '';
			});
			statusIndeterminate.children[i].style.borderTopColor = '#dfdfdf';
		}
	}

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		[statusProgress, statusIndeterminate, statusNotice].forEach((elem) => {
			elem.style.display = 'none';
		});
		animationCallbacks = animationCallbacks.filter(function (value) {
			return (value !== animateStatusIndeterminate);
		});
		switch (mode) {
		case 'progress':
			statusProgress.style.display = 'block';
			break;
		case 'indeterminate':
			statusIndeterminate.style.display = 'block';
			animationCallbacks.push(animateStatusIndeterminate);
			break;
		case 'notice':
			statusNotice.style.display = 'block';
			break;
		case 'hidden':
			break;
		default:
			throw new Error('Invalid status mode');
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		const msg = err.message || err;
		console.error(msg);
		setStatusNotice(msg);
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures();
	if (missing.length !== 0) {
		const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
		displayFailureNotice(missingMsg + missing.join('\n'));
	} else {
		setStatusMode('indeterminate');
		engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					const pct = Math.round((current / total) * 100);
					statusProgressInner.style.width = pct + '%';
					setStatusMode('progress');
					// Update percentage display
					if (loadingPercent) {
						const mb = (current / (1024 * 1024)).toFixed(1);
						const totalMb = (total / (1024 * 1024)).toFixed(1);
						loadingPercent.textContent = pct + '% — ' + mb + ' / ' + totalMb + ' MB';
					}
					if (current === total) {
						if (loadingPercent) loadingPercent.textContent = 'جارٍ بدء اللعبة...';
						setTimeout(() => {
							setStatusMode('indeterminate');
						}, 500);
					}
				} else {
					setStatusMode('indeterminate');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			initializing = false;
			// Fade out loading screen to reveal the game canvas
			if (loadingContainer) {
				loadingContainer.classList.add('hidden');
			}
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
