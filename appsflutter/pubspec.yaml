name: classify_flutter
description: "Classify - منصة تعليمية للأطفال مع رقابة أبوية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Network
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.5

  # UI
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animate_do: ^4.2.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2

  # Push Notifications
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^20.1.0

  # WebView (for HTML games)
  webview_flutter: ^4.10.0

  # Camera & Image
  image_picker: ^1.1.2
  image_cropper: ^11.0.0

  # Charts
  fl_chart: ^1.1.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Biometric Auth
  local_auth: ^3.0.1

  # Connectivity
  connectivity_plus: ^7.0.0

  # Internationalization
  intl: ^0.20.2

  # Utils
  logger: ^2.5.0
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0
  pin_code_fields: ^9.1.0
  flutter_spinkit: ^5.2.1
  gap: ^3.0.1
  heroicons: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3
  mockito: ^5.4.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
